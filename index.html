<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>现场拍照证明</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="proof-widget" data-state="idle">
      <section class="camera-stage" aria-label="现场拍照">
        <video id="cameraVideo" autoplay muted playsinline></video>
        <canvas id="photoCanvas" hidden></canvas>
        <img id="photoPreview" alt="已拍摄的现场证明照片" hidden />
        <div id="emptyState" class="empty-state">请开启摄像头现场拍照</div>
      </section>

      <section class="proof-meta" aria-label="证明信息">
        <div class="meta-pill" id="gpsText">定位：等待授权</div>
        <div class="meta-pill" id="timeText">时间：准备中</div>
      </section>

      <section class="actions" aria-label="拍照操作">
        <button id="startCameraButton" type="button">开启摄像头</button>
        <button id="captureButton" type="button" disabled>拍照</button>
        <button id="retakeButton" type="button" disabled>重拍</button>
      </section>

      <p id="message" class="message" role="status"></p>
    </main>

    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
    <script src="./widget.js"></script>
  </body>
</html>
