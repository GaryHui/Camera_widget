<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>9-photo proof camera widget</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="proof-widget" data-state="idle">
      <section class="stepbar" aria-label="Capture progress">
        <span id="stepProgress">1/9</span>
        <strong id="stepTitle">Ready to capture</strong>
      </section>

      <section class="camera-stage" aria-label="Proof camera">
        <video id="cameraVideo" autoplay muted playsinline></video>
        <canvas id="photoCanvas" hidden></canvas>
        <img id="photoPreview" alt="Captured proof photo" hidden />
        <div id="emptyState" class="empty-state">Start the camera to capture proof photos</div>
        <div id="taskHint" class="task-hint">Ready to capture</div>
      </section>

      <section id="thumbs" class="thumbs" aria-label="Captured photos"></section>

      <section class="proof-meta" aria-label="Proof metadata">
        <div class="meta-pill" id="gpsText">Location: waiting</div>
        <div class="meta-pill" id="timeText">Time: ready</div>
        <div class="meta-pill" id="dropboxText">Dropbox: checking</div>
      </section>

      <section class="actions" aria-label="Photo actions">
        <button id="startCameraButton" type="button">Start camera</button>
        <button id="captureButton" type="button" disabled>Capture</button>
        <button id="retakeButton" type="button" disabled>Retake</button>
        <button id="connectDropboxButton" type="button">Connect Dropbox</button>
        <button id="disconnectDropboxButton" type="button" hidden>Disconnect</button>
      </section>

      <p id="message" class="message" role="status"></p>
    </main>

    <script src="https://js.jotform.com/JFCustomWidget.js"></script>
    <script src="./widget.js"></script>
  </body>
</html>
